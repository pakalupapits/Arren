<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Me Get Home – Arren Rael S. Go</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(255,100,130,0.18), 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
    position: relative;
  }

  .header-band {
    background: linear-gradient(135deg, #ff6b8a 0%, #ff9eb5 60%, #ffccd8 100%);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
  }

  .header-band::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 0; right: 0;
    height: 36px;
    background: #ffffff;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  .sos-badge {
    display: inline-block;
    background: #fff;
    color: #ff4466;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 999px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(255,68,102,0.2);
  }

  .header-band h1 {
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: #fff;
    text-shadow: 0 2px 8px rgba(180,40,70,0.25);
    line-height: 1.2;
  }

  .photo-wrap {
    display: flex;
    justify-content: center;
    margin-top: 28px;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .photo-ring {
    border-radius: 50%;
    padding: 5px;
    background: linear-gradient(135deg, #ff6b8a, #ffb3c6);
    box-shadow: 0 6px 24px rgba(255,100,130,0.3);
  }

  .photo-ring img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border: 4px solid #fff;
  }

  .body {
    padding: 10px 28px 32px;
    text-align: center;
  }

  .child-name {
    font-size: 22px;
    font-weight: 900;
    color: #2d2d3a;
    margin-top: 14px;
    line-height: 1.2;
  }

  .message-box {
    background: #fff5f7;
    border-left: 4px solid #ff6b8a;
    border-radius: 12px;
    padding: 14px 16px;
    margin: 18px 0 22px;
    text-align: left;
    font-size: 15px;
    color: #444;
    line-height: 1.65;
  }

  .message-box .emoji {
    font-size: 20px;
    display: block;
    margin-bottom: 6px;
  }

  .divider-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #ff6b8a;
    margin-bottom: 14px;
  }

  .contact-card {
    background: #fff5f7;
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .contact-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(255,107,138,0.15);
  }

  .contact-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .dad .contact-icon { background: linear-gradient(135deg, #4f8ef7, #7eb4ff); }
  .mom .contact-icon { background: linear-gradient(135deg, #ff6b8a, #ffb3c6); }

  .contact-info .role {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 2px;
  }

  .contact-info .name {
    font-size: 15px;
    font-weight: 800;
    color: #2d2d3a;
    margin-bottom: 3px;
  }

  .contact-info a {
    font-size: 17px;
    font-weight: 900;
    color: #ff4466;
    text-decoration: none;
    letter-spacing: 0.5px;
  }

  .contact-info a:hover { text-decoration: underline; }

  .footer-note {
    margin-top: 20px;
    font-size: 12px;
    color: #bbb;
    font-weight: 600;
  }

  .heart { color: #ff6b8a; }
</style>
</head>
